<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="دليل - منصة المحتوى المغربي بالدارجة" />
  <title>دليل | DALIL</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Cairo', sans-serif; }
    .card-hover { transition: transform 0.2s ease; }
    .card-hover:active { transform: scale(0.98); }
    .mic-pulse { animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(229,62,62,0.4); }
      50% { box-shadow: 0 0 0 12px rgba(229,62,62,0); }
    }
    .modal-slide { animation: slideUp 0.3s ease; }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity:0; }
      to { transform: translateY(0); opacity:1; }
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<!-- HEADER -->
<header class="bg-white sticky top-0 z-40 shadow-sm border-b border-gray-100">
  <div class="flex items-center gap-2 px-3 py-2">
    <a href="/" class="flex items-center gap-1 shrink-0">
      <div class="bg-red-600 rounded-lg w-8 h-8 flex items-center justify-center">
        <span class="text-white font-black text-sm">د</span>
      </div>
      <span class="font-black text-xl text-red-600">DALIL</span>
    </a>
    <div class="flex-1 relative">
      <input id="searchInput" type="search" placeholder="ابحث في دليل..."
        class="w-full bg-gray-100 rounded-full px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-red-300 pr-9"
        oninput="handleSearch(this.value)"/>
      <svg class="absolute right-3 top-2.5 w-4 h-4 text-gray-400" fill="none" stroke="cur
        <!-- FLOATING BUTTON -->
<button onclick="openModal()"
  class="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 bg-red-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center active:scale-95 transition-all">
  <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
  </svg>
</button>

<!-- DASHBOARD -->
<div id="dashboardPanel" class="hidden fixed inset-0 z-50 bg-black/50" onclick="closeDashboard()">
  <div class="absolute left-0 top-0 h-full w-72 bg-white p-5" onclick="event.stopPropagation()">
    <div class="flex items-center gap-3 mb-6 pb-4 border-b">
      <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center text-2xl">👤</div>
      <div>
        <p class="font-bold">مستخدم دليل</p>
        <p class="text-xs text-gray-500">عضو جديد</p>
      </div>
    </div>
    <div class="bg-gradient-to-br from-red-600 to-orange-500 rounded-xl p-4 mb-4 text-white">
      <p class="text-xs opacity-80 mb-1">مجموع المكاسب</p>
      <p class="text-3xl font-black" id="totalEarnings">0.00</p>
      <p class="text-sm opacity-80">درهم مغربي</p>
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div class="bg-gray-50 rounded-xl p-3 text-center">
        <p class="text-xl font-black text-red-600" id="totalViews">0</p>
        <p class="text-xs text-gray-500">مشاهدة</p>
      </div>
      <div class="bg-gray-50 rounded-xl p-3 text-center">
        <p class="text-xl font-black text-red-600" id="totalPosts">0</p>
        <p class="text-xs text-gray-500">مقال</p>
      </div>
    </div>
    <p class="text-xs text-gray-400 text-center mt-4">كل 1000 مشاهدة = 50 درهم</p>
  </div>
</div>

<!-- ADD MODAL -->
<div id="addModal" class="hidden fixed inset-0 z-50 bg-black/60 flex items-end">
  <div class="modal-slide w-full bg-white rounded-t-2xl p-5">
    <div class="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4"></div>
    <div class="flex items-center justify-between mb-5">
      <h2 class="font-black text-lg">مقال جديد 🎙️</h2>
      <button onclick="closeModal()" class="text-gray-400 text-2xl">&times;</button>
    </div>
    <select id="postCategory" class="w-full bg-gray-100 rounded-xl px-4 py-2.5 text-sm outline-none mb-4">
      <option value="all">الكل</option>
      <option value="cook">🍲 الطبخ</option>
      <option value="health">💊 الصحة</option>
      <option value="law">⚖️ القانون</option>
      <option value="auto">🚗 السيارات</option>
      <option value="finance">💰 المال</option>
    </select>
    <div class="flex flex-col items-center gap-3 mb-5">
      <button id="micBtn" onclick="toggleRecording()"
        class="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center shadow-lg">
        <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
        </svg>
      </button>
      <p id="recStatus" class="text-xs text-gray-500">اضغط للتسجيل</p>
      <div id="transcribedText" class="hidden w-full bg-gray-50 rounded-xl p-3 text-sm text-gray-700 border border-gray-200 min-h-16"></div>
    </div>
    <input id="authorName" type="text" placeholder="اسمك - مثال: محمد من الدار البيضاء"
      class="w-full bg-gray-100 rounded-xl px-4 py-2.5 text-sm outline-none mb-4"/>
    <button onclick="submitPost()" id="submitBtn"
      class="w-full bg-red-600 text-white font-bold py-3.5 rounded-xl text-base active:scale-95 transition-transform">
      نشر المقال 🚀
    </button>
  </div>
</div>

<script>
const API_URL = 'https://dalil-worker.YOUR-NAME.workers.dev';
let mediaRecorder, audioChunks=[], isRecording=false;
let allPosts=[], selectedPhotos=[];

function getDemoPosts(){
  return [
    {id:1,title:'كيفاش تصنع الطاجين ديال الدجاج بطريقة المغرب',author:'فاطمة من فاس',views:1240,category:'cook',image:'https://images.unsplash.com/photo-1547592180-85f173990554?w=400'},
    {id:2,title:'حقوقك كخدام فالمغرب - اللي خاصك تعرف',author:'محمد العدل',views:3800,category:'law',image:'https://images.unsplash.com/photo-1589829545856-d10d557cf95f?w=400'},
    {id:3,title:'كيفاش تفحص طوموبيلك قبل الشراء',author:'يوسف الميكانو',views:920,category:'auto',image:'https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=400'},
    {id:4,title:'نصائح صحية للشتا - كيفاش تحمي راسك',author:'دكتور سعيد',views:2100,category:'health',image:'https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=400'},
    {id:5,title:'كيفاش توفر الفلوس براحة - طريقة 50/30/20',author:'نورة المالية',views:5600,category:'finance',image:'https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?w=400'},
  ];
}

function calcEarnings(v){return(v*0.05).toFixed(2);}
function formatViews(v){return v>=1000?(v/1000).toFixed(1)+'k':v;}
function getCategoryEmoji(c){return{cook:'🍲',health:'💊',law:'⚖️',auto:'🚗',finance:'💰'}[c]||'📌';}

async function loadPosts(){
  try{
    const res=await fetch(`${API_URL}/api/posts`);
    const data=await res.json();
    allPosts=data.posts||[];
    renderPosts(allPosts);
  }catch(e){
    allPosts=getDemoPosts();
    renderPosts(allPosts);
  }
}

function renderPosts(posts){
  document.getElementById('skeleton').classList.add('hidden');
  const c=document.getElementById('postsContainer');
  const e=document.getElementById('emptyState');
  if(!posts.length){c.classList.add('hidden');e.classList.remove('hidden');return;}
  c.classList.remove('hidden');e.classList.add('hidden');
  c.innerHTML=posts.map(p=>`
    <article class="bg-white rounded-xl overflow-hidden shadow-sm card-hover">
      <div class="relative">
        <img src="${p.image||'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400'}"
          alt="${p.title}" class="w-full h-48 object-cover" loading="lazy"/>
        <span class="absolute top-2 right-2 bg-black/50 text-white text-xs px-2 py-0.5 rounded-full">
          ${getCategoryEmoji(p.category)}
        </span>
      </div>
      <div class="p-3">
        <h2 class="font-bold text-sm leading-snug mb-1">${p.title}</h2>
        <div class="flex items-center justify-between">
          <p class="text-xs text-gray-500">${p.author}</p>
          <span class="text-xs font-bold text-green-600">${calcEarnings(p.views)} DH</span>
        </div>
      </div>
    </article>`).join('');
}

function handleSearch(q){
  if(!q.trim()){renderPosts(allPosts);return;}
  renderPosts(allPosts.filter(p=>p.title.includes(q)||p.author.includes(q)));
}

function filterCategory(cat){
  document.querySelectorAll('.category-btn').forEach(b=>{
    b.classList.remove('bg-red-600','text-white');
    b.classList.add('bg-gray-100','text-gray-600');
  });
  event.target.classList.add('bg-red-600','text-white');
  event.target.classList.remove('bg-gray-100','text-gray-600');
  renderPosts(cat==='all'?allPosts:allPosts.filter(p=>p.category===cat));
}

function openModal(){document.getElementById('addModal').classList.remove('hidden');}
function closeModal(){document.getElementById('addModal').classList.add('hidden');}
function toggleDashboard(){
  document.getElementById('dashboardPanel').classList.toggle('hidden');
  const views=allPosts.reduce((s,p)=>s+p.views,0);
  document.getElementById('totalViews').textContent=formatViews(views);
  document.getElementById('totalPosts').textContent=allPosts.length;
  document.getElementById('totalEarnings').textContent=calcEarnings(views);
}
function closeDashboard(){document.getElementById('dashboardPanel').classList.add('hidden');}

async function toggleRecording(){
  if(!isRecording){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRecorder=new MediaRecorder(stream);
      audioChunks=[];
      mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
      mediaRecorder.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(audioChunks,{type:'audio/webm'});
        await transcribeAudio(blob);
      };
      mediaRecorder.start();
      isRecording=true;
      document.getElementById('recStatus').textContent='⏺ جاري التسجيل... اضغط للإيقاف';
      document.getElementById('micBtn').classList.add('mic-pulse');
    }catch(e){alert('الرجاء السماح بالوصول للميكروفون');}
  }else{
    mediaRecorder.stop();
    isRecording=false;
    document.getElementById('recStatus').textContent='⏳ جاري التحليل...';
    document.getElementById('micBtn').classList.remove('mic-pulse');
  }
}

async function transcribeAudio(blob){
  try{
    const form=new FormData();
    form.append('audio',blob,'recording.webm');
    const res=await fetch(`${API_URL}/api/transcribe`,{method:'POST',body:form});
    const data=await res.json();
    const el=document.getElementById('transcribedText');
    el.textContent=data.text||'لم يتم التعرف على الكلام';
    el.classList.remove('hidden');
    document.getElementById('recStatus').textContent='✅ تم التحليل';
  }catch(e){
    const el=document.getElementById('transcribedText');
    el.textContent='نص تجريبي بالدارجة المغربية';
    el.classList.remove('hidden');
    document.getElementById('recStatus').textContent='✅ جاهز';
  }
}

async function submitPost(){
  const text=document.getElementById('transcribedText').textContent;
  const author=document.getElementById('authorName').value||'مجهول';
  const category=document.getElementById('postCategory').value;
  if(!text||text.trim()===''){alert('سجل كلامك أولاً');return;}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='⏳ جاري النشر...';
  const newPost={
    id:Date.now(),title:text.substring(0,80),
    author,category,views:0,
    image:'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400'
  };
  allPosts.unshift(newPost);
  renderPosts(allPosts);
  closeModal();
  btn.disabled=false;btn.textContent='نشر المقال 🚀';
  window.scrollTo({top:0,behavior:'smooth'});
}

document.addEventListener('DOMContentLoaded',loadPosts);
</script>
</body>
      </html>
